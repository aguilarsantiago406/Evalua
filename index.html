html:           <!DOCTYPE html>

<html lang="es">

<head>

  <meta charset="UTF-8">

  <title>Sistemas SENATI - IA Team</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>



  <header>

    <h1>SISTEMAS & IA - SENATI</h1>

    <div class="presentacion">

      Somos estudiantes de <strong>Ingeniería de Software con IA</strong>.

      Nos apasiona investigar, aprender cosas nuevas y dominar el mundo de la programación.

    </div>

  </header>



  <div class="equipo">

    

    <div class="tarjeta-container">

      <input type="checkbox" id="btn-santiago" class="trigger">

      <label for="btn-santiago" class="tarjeta">

        <div class="foto-perfil">

          <img src="https://cdn-icons-png.flaticon.com/512/2353/2353678.png" alt="Santiago">

        </div>

        <div class="nombre">Santiago Aguilar</div>

        <div class="indicador">CLIC PARA INFO</div>

        <div class="info-detallada">

          Santiago es un chico muy hábil de <strong>20 años</strong>. Le encanta la programación y resolver retos lógicos complejos.

        </div>

      </label>

    </div>



    <div class="tarjeta-container">

      <input type="checkbox" id="btn-angie" class="trigger">

      <label for="btn-angie" class="tarjeta">

        <div class="foto-perfil">

          <img src="https://cdn-icons-png.flaticon.com/512/616/616412.png" alt="Angie">

        </div>

        <div class="nombre">Angie Palo</div>

        <div class="indicador">CLIC PARA INFO</div>

        <div class="info-detallada">

          Angie tiene <strong>19 años</strong> y es una apasionada de la programación. Disfruta crear estructuras de software eficientes.

        </div>

      </label>

    </div>



    <div class="tarjeta-container">

      <input type="checkbox" id="btn-camila" class="trigger">

      <label for="btn-camila" class="tarjeta">

        <div class="foto-perfil">

          <img src="https://cdn-icons-png.flaticon.com/512/6944/6944351.png" alt="Camila">

        </div>

        <div class="nombre">Camila Verme</div>

        <div class="indicador">CLIC PARA INFO</div>

        <div class="info-detallada">

          Camila tiene <strong>19 años</strong> le gusta mucho la programación y siempre tiene la intención de estar <strong>aprendiendo cosas nuevas</strong> de IA.

        </div>

      </label>

    </div>

  </div>


</body>

</html>
